name: CI

on:
  push:
    branches: [main, 'nextjs/**', 'feature/**', 'fix/**', 'claude/**']
  pull_request:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # ── 1. Type-check & Lint ──────────────────────────────────────────────────
  lint:
    name: Lint & type-check
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
      - run: npm ci --prefer-offline
      - run: npx tsc --noEmit
        name: TypeScript check
      - run: npx eslint . --ext .js,.ts,.tsx --max-warnings 0 --ignore-path .eslintignore
        name: ESLint

  # ── 2. Build ─────────────────────────────────────────────────────────────
  build:
    name: Next.js build
    runs-on: ubuntu-latest
    needs: lint
    timeout-minutes: 15
    env:
      SESSION: ci-session-secret-32-chars-min!!
      DB_HOST: localhost
      DB_PORT: 3306
      DB_NAME: snip_test
      DB_USER: snip
      DB_PASSWORD: snip_password
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
      - run: npm ci --prefer-offline
      - run: npm run build
        name: Build Next.js app
      - uses: actions/upload-artifact@v4
        with:
          name: nextjs-build
          path: .next/
          retention-days: 7

  # ── 3. Tests ──────────────────────────────────────────────────────────────
  test:
    name: Tests
    runs-on: ubuntu-latest
    needs: lint
    timeout-minutes: 15
    services:
      mysql:
        image: mysql:8.0
        env:
          MYSQL_ROOT_PASSWORD: root
          MYSQL_DATABASE: snip_test
          MYSQL_USER: snip
          MYSQL_PASSWORD: snip_password
        ports:
          - 3306:3306
        options: >-
          --health-cmd="mysqladmin ping -h 127.0.0.1 --silent"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=5
    env:
      NODE_ENV: test
      SESSION: test-session-secret-32-chars!!
      DB_HOST: 127.0.0.1
      DB_PORT: 3306
      DB_NAME: snip_test
      DB_USER: snip
      DB_PASSWORD: snip_password
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
      - run: npm ci --prefer-offline
      - run: npm run test --if-present -- --passWithNoTests
        name: Run tests

  # ── 4. Docker build ───────────────────────────────────────────────────────
  docker:
    name: Docker build
    runs-on: ubuntu-latest
    needs: build
    timeout-minutes: 20
    if: github.ref == 'refs/heads/main'
    steps:
      - uses: actions/checkout@v4
      - run: docker build -t snip-app:ci .
        name: Build Docker image
